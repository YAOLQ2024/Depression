{% extends "base.html" %}

{% block title %}测评完成 - SDS{% endblock %}

{% block breadcrumb %}{% endblock %}

{% block content %}
<style>
    .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.85) 100%);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        position: relative;
        overflow: hidden;
    }
    
    .pattern-dots {
        background-image: radial-gradient(#94A3B8 1px, transparent 1px);
        background-size: 20px 20px;
        opacity: 0.08;
        position: absolute; inset: 0; pointer-events: none; z-index: 0;
    }

    .inner-bubble {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(3px);
    }

    @keyframes float-small {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(30px, -30px); }
    }
    @keyframes float-small-reverse {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-30px, 30px); }
    }
    @keyframes success-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
    }
    
    .animate-float-small { animation: float-small 6s ease-in-out infinite; }
    .animate-float-small-reverse { animation: float-small-reverse 7s ease-in-out infinite; }
    .animate-success-pulse { animation: success-pulse 2s ease-in-out infinite; }
</style>

<div class="relative m-0">
    <main class="relative z-10 w-full p-[30px]">
        <div class="flex min-h-[80vh] items-center justify-center">
            <div class="w-full max-w-2xl">
                <div class="glass-panel rounded-[32px] shadow-2xl p-12 relative overflow-hidden">
                    <div class="pattern-dots"></div>
                    
                    <!-- 装饰气泡 -->
                    <div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
                        <div class="inner-bubble w-48 h-48 -top-10 -right-10 bg-green-200/40 animate-float-small"></div>
                        <div class="inner-bubble w-40 h-40 -bottom-10 -left-10 bg-blue-200/35 animate-float-small-reverse"></div>
                        <div class="inner-bubble w-32 h-32 top-1/2 left-1/3 bg-purple-100/30 animate-float-small"></div>
                        <div class="inner-bubble w-36 h-36 bottom-1/3 right-1/4 bg-cyan-100/25 animate-float-small-reverse"></div>
                    </div>

                    <div class="relative z-10 space-y-8 text-center">
                        <!-- Success Icon -->
                        <div class="flex justify-center">
                            <div class="relative">
                                <div class="w-28 h-28 rounded-full bg-gradient-to-br from-green-400 to-teal-500 flex items-center justify-center shadow-2xl shadow-green-500/30 animate-success-pulse">
                                    <i class="fa-solid fa-circle-check text-white text-5xl"></i>
                                </div>
                                <div class="absolute inset-0 rounded-full bg-gradient-to-br from-green-400 to-teal-500 opacity-30 blur-xl animate-pulse"></div>
                            </div>
                        </div>
                        
                        <!-- Title & Description -->
                        <div class="space-y-3">
                            <h2 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-600">
                                测评已完成
                            </h2>
                            <p class="text-slate-600 leading-relaxed text-lg max-w-lg mx-auto">
                                您的 SDS 问卷已成功提交并完成分析<br/>
                                系统已生成您的个性化综合报告
                            </p>
                        </div>

                        <!-- Stats Cards -->
                        <div class="grid grid-cols-3 gap-4 py-6">
                            <div class="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl p-4 border border-blue-100">
                                <div class="text-3xl font-bold text-blue-600">20</div>
                                <div class="text-xs text-slate-600 mt-1">题目完成</div>
                            </div>
                            <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-2xl p-4 border border-purple-100">
                                <div class="text-3xl font-bold text-purple-600">100%</div>
                                <div class="text-xs text-slate-600 mt-1">完成度</div>
                            </div>
                            <div class="bg-gradient-to-br from-green-50 to-teal-50 rounded-2xl p-4 border border-green-100">
                                <div class="text-3xl font-bold text-green-600">✓</div>
                                <div class="text-xs text-slate-600 mt-1">已分析</div>
                            </div>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="flex flex-col gap-3 pt-4">
                            <a href="{{ url_for('main.comprehensive_detail', record_id=record_id) }}" 
                                class="w-full py-4 px-6 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-500/30 hover:shadow-xl hover:-translate-y-0.5 flex items-center justify-center gap-2 text-lg">
                                <i class="fa-solid fa-file-medical"></i>
                                <span>查看本次报告</span>
                            </a>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <a href="{{ url_for('main.history') }}"
                                    class="py-3 px-4 glass-panel rounded-xl hover:shadow-md text-slate-700 hover:text-slate-900 font-semibold transition-all flex items-center justify-center gap-2 border border-slate-200">
                                    <i class="fa-solid fa-clock-rotate-left"></i>
                                    <span>历史记录</span>
                                </a>
                                
                                <a href="{{ url_for('main.main') }}"
                                    class="py-3 px-4 glass-panel rounded-xl hover:shadow-md text-slate-700 hover:text-slate-900 font-semibold transition-all flex items-center justify-center gap-2 border border-slate-200">
                                    <i class="fa-solid fa-gauge"></i>
                                    <span>返回主页</span>
                                </a>
                            </div>
                        </div>

                        <!-- Info Tip -->
                        <div class="bg-blue-50/50 border border-blue-100 rounded-xl p-4 text-left">
                            <div class="flex items-start gap-3">
                                <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center shrink-0">
                                    <i class="fa-solid fa-lightbulb text-blue-600"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-800 mb-1 text-sm">温馨提示</div>
                                    <div class="text-xs text-slate-600 leading-relaxed">
                                        建议您定期进行心理健康测评，以便及时了解自己的情绪状态变化。如有需要，可随时使用AI咨询助手获取支持。
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
{% endblock %}

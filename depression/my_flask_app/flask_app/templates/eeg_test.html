<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEG 数据流调试页</title>
    <style>
        :root {
            --primary: #165DFF;
            --primary-soft: #E8F3FF;
            --muted: #4E5969;
            --muted-soft: #86909C;
            --border: #E5E8EF;
            --panel: rgba(255, 255, 255, 0.92);
            --danger: #F53F3F;
            --success: #00B42A;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans SC", "Segoe UI", sans-serif;
            color: #1D2129;
            background:
                radial-gradient(circle at 12% 12%, rgba(147, 197, 253, 0.18), transparent 32%),
                radial-gradient(circle at 88% 88%, rgba(167, 139, 250, 0.10), transparent 34%),
                #F8FAFC;
        }

        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 48px;
        }

        .panel {
            background: linear-gradient(135deg, var(--panel), rgba(248, 250, 252, 0.86));
            border: 1px solid rgba(255, 255, 255, 0.85);
            box-shadow: 0 12px 32px -18px rgba(148, 163, 184, 0.32);
            backdrop-filter: blur(20px);
            border-radius: 24px;
        }

        .hero {
            padding: 28px;
        }

        .hero h1 {
            margin: 10px 0 0;
            font-size: 32px;
        }

        .hero p {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.8;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid var(--border);
        }

        .status.connected {
            color: var(--success);
            background: rgba(236, 253, 245, 0.86);
            border-color: rgba(0, 180, 42, 0.18);
        }

        .status.error {
            color: var(--danger);
            background: rgba(255, 236, 232, 0.86);
            border-color: rgba(245, 63, 63, 0.16);
        }

        .grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 20px;
            margin-top: 20px;
        }

        .panel-section {
            padding: 22px;
        }

        .panel-title {
            margin: 0 0 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted-soft);
        }

        .log {
            height: 280px;
            overflow: auto;
            padding: 16px;
            border-radius: 18px;
            border: 1px solid #DDE6F2;
            background: rgba(15, 23, 42, 0.96);
            color: #E2E8F0;
            font-family: "JetBrains Mono", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log .error { color: #FCA5A5; }
        .log .success { color: #86EFAC; }
        .log .info { color: #93C5FD; }

        pre {
            margin: 0;
            padding: 16px;
            white-space: pre-wrap;
            word-break: break-word;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(248, 250, 252, 0.92);
            color: var(--muted);
            min-height: 160px;
            line-height: 1.7;
        }

        .wave-shell {
            padding: 16px;
            border-radius: 18px;
            border: 1px solid #DDE6F2;
            background: rgba(255, 255, 255, 0.86);
        }

        canvas {
            display: block;
            width: 100%;
            height: 260px;
            border-radius: 14px;
            background: rgba(248, 250, 252, 0.96);
            border: 1px solid rgba(226, 232, 240, 0.96);
            box-shadow: inset 0 2px 10px rgba(148, 163, 184, 0.10);
        }

        .wave-caption {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted-soft);
            font-family: "JetBrains Mono", "Consolas", monospace;
        }

        .meta-list {
            display: grid;
            gap: 12px;
        }

        .meta-item {
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.78);
        }

        .meta-item strong {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        @media (max-width: 960px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="panel hero">
            <div class="panel-title">EEG Debug Console</div>
            <h1>脑电数据流调试页面</h1>
            <p>这个页面只用于确认前端能不能实时收到 EEG 数据。真正的业务显示页是问诊页面里的 EEG 面板。</p>
            <div id="status" class="status">等待连接</div>
        </section>

        <div class="grid">
            <section class="panel panel-section">
                <h2 class="panel-title">实时日志</h2>
                <div class="log" id="log"></div>
            </section>

            <section class="panel panel-section">
                <h2 class="panel-title">连接概况</h2>
                <div class="meta-list">
                    <div class="meta-item">
                        <strong>最新状态</strong>
                        <div id="latestSummary">等待数据...</div>
                    </div>
                    <div class="meta-item">
                        <strong>最近数据包</strong>
                        <pre id="latest-data">等待数据...</pre>
                    </div>
                </div>
            </section>
        </div>

        <section class="panel panel-section" style="margin-top: 20px;">
            <h2 class="panel-title">波形图</h2>
            <div class="wave-shell">
                <canvas id="waveform" width="1000" height="260"></canvas>
                <div id="scaleInfo" class="wave-caption">自动刻度：等待波形数据...</div>
            </div>
        </section>
    </div>

    <script>
        const log = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const latestDataEl = document.getElementById('latest-data');
        const latestSummaryEl = document.getElementById('latestSummary');
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        const scaleInfoEl = document.getElementById('scaleInfo');

        let dataBuffer = [];

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${time}] ${msg}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        function setStatus(text, mode) {
            statusEl.textContent = text;
            statusEl.className = `status${mode ? ` ${mode}` : ''}`;
        }

        function formatScaleValue(value) {
            if (!Number.isFinite(value)) return '--';
            if (Math.abs(value) >= 100) return value.toFixed(0);
            if (Math.abs(value) >= 10) return value.toFixed(1);
            return value.toFixed(2);
        }

        function getWaveStats(values) {
            const finiteValues = values.filter((value) => Number.isFinite(value));
            if (!finiteValues.length) {
                return { baseline: 0, amplitude: 1 };
            }

            const baseline = finiteValues.reduce((sum, value) => sum + value, 0) / finiteValues.length;
            const deviations = finiteValues.map((value) => Math.abs(value - baseline));
            const meanDeviation = deviations.reduce((sum, value) => sum + value, 0) / deviations.length;
            const peakDeviation = deviations.reduce((max, value) => Math.max(max, value), 0);
            const amplitude = Math.max(Math.min(peakDeviation, Math.max(meanDeviation * 6, 0.05)), 0.05);

            return { baseline, amplitude };
        }

        function drawWaveform() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath();
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.28)';
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            if (dataBuffer.length < 2) {
                ctx.fillStyle = '#94A3B8';
                ctx.font = '14px Noto Sans SC';
                ctx.textAlign = 'center';
                ctx.fillText('等待波形数据...', canvas.width / 2, canvas.height / 2 + 4);
                scaleInfoEl.textContent = '自动刻度：等待波形数据...';
                return;
            }

            ctx.beginPath();
            ctx.strokeStyle = '#2563EB';
            ctx.lineWidth = 2;

            const step = canvas.width / Math.max(dataBuffer.length - 1, 1);
            const centerY = canvas.height / 2;
            const { baseline, amplitude } = getWaveStats(dataBuffer);
            const verticalLimit = canvas.height * 0.38;
            const pixelsPerUnit = verticalLimit / amplitude;

            dataBuffer.forEach((val, i) => {
                const x = i * step;
                const centered = val - baseline;
                const yOffset = Math.max(-verticalLimit, Math.min(verticalLimit, centered * pixelsPerUnit));
                const y = centerY - yOffset;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();

            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(37, 99, 235, 0.22)');
            gradient.addColorStop(1, 'rgba(37, 99, 235, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();
            scaleInfoEl.textContent = `自动刻度：基线 ${formatScaleValue(baseline)}，当前窗口约 ±${formatScaleValue(amplitude)}`;
        }

        function ingestWaveform(values) {
            if (!Array.isArray(values) || values.length === 0) return;
            dataBuffer = values.slice(-600);
            drawWaveform();
        }

        function updateFromChannelsPayload(payload) {
            const waveform = payload?.data?.channel1?.waveform || payload?.data?.values || [];
            ingestWaveform(waveform);

            const source = payload?.data?.source || {};
            if (source.connected) {
                setStatus('已连接', 'connected');
                latestSummaryEl.textContent = '原始波形已到达前端，正在持续刷新。';
            } else if (source.last_error) {
                setStatus('连接异常', 'error');
                latestSummaryEl.textContent = source.last_error;
            } else {
                setStatus('等待连接', '');
                latestSummaryEl.textContent = '等待 EEG 推流端发送数据。';
            }
        }

        addLog('正在连接到 /eeg/stream...', 'info');
        const eventSource = new EventSource('/eeg/stream');

        eventSource.onopen = () => {
            setStatus('SSE 已连接', 'connected');
            addLog('SSE 连接已建立', 'success');
        };

        eventSource.onmessage = (event) => {
            try {
                const batch = JSON.parse(event.data);
                if (!Array.isArray(batch) || batch.length === 0) return;

                const channel1Raw = batch.filter((item) => item.type === 'raw' && item.channel === 1);
                if (channel1Raw.length > 0) {
                    channel1Raw.forEach((item) => dataBuffer.push(item.value));
                    dataBuffer = dataBuffer.slice(-600);
                    drawWaveform();
                }

                const latest = batch[batch.length - 1];
                latestDataEl.textContent = JSON.stringify(latest, null, 2);
                latestSummaryEl.textContent = `收到 ${batch.length} 条流式数据，通道 1 当前缓存 ${dataBuffer.length} 点`;
                addLog(`收到数据批次: ${batch.length} 条`, 'success');
            } catch (e) {
                addLog(`数据解析错误: ${e.message}`, 'error');
            }
        };

        eventSource.onerror = () => {
            setStatus('SSE 异常', 'error');
            addLog('SSE 连接异常，开始轮询备用接口', 'error');
        };

        setInterval(() => {
            fetch('/eeg/history')
                .then((response) => response.json())
                .then((payload) => {
                    if (!payload.success) {
                        throw new Error(payload.error || 'EEG history 接口失败');
                    }
                    updateFromChannelsPayload(payload);
                    latestDataEl.textContent = JSON.stringify(payload.data?.channel1?.features?.current || {}, null, 2);
                    addLog(`轮询获取到 ${(payload.data?.channel1?.waveform || payload.data?.values || []).length} 个历史数据点`, 'info');
                })
                .catch((error) => {
                    setStatus('接口异常', 'error');
                    addLog(`轮询失败: ${error.message}`, 'error');
                });
        }, 2000);

        drawWaveform();
    </script>
</body>
</html>

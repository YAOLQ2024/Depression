<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - SDS 多模态评估系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', Inter, sans-serif;
            background-image: linear-gradient(135deg, #E3E8F0 0%, #D8DDE6 100%);
            background-attachment: fixed;
            color: #1D2129;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-[440px] bg-white rounded-[20px] shadow-lg border-none md:border md:border-gray-200 overflow-hidden my-8">
        <!-- Header -->
        <div class="px-8 pt-8 pb-6 text-center space-y-2">
            <h1 class="text-2xl font-bold text-[#1D2129]">创建新账号</h1>
            <p class="text-[#86909C] text-sm">注册以开始您的心理健康评估之旅</p>
        </div>

        <!-- Form -->
        <div class="px-8 pb-8">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="mb-6 space-y-2">
                {% for category, message in messages %}
                  <div class="p-3 rounded-[12px] text-sm font-medium flex items-start gap-2
                    {% if category == 'error' %}bg-[#FFECE8] text-[#F53F3F] border border-[#F53F3F]/50{% else %}bg-[#E8F3FF] text-[#165DFF] border border-[#165DFF]/50{% endif %}">
                    <i class="fa-solid {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-info{% endif %} mt-0.5"></i>
                    <span>{{ message }}</span>
                  </div>
                {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('account.register') }}" method="POST" class="space-y-4">
                
                <!-- 账号 -->
                <div>
                    <label class="block text-sm font-medium text-[#4E5969] mb-1.5">账号 <span class="text-[#F53F3F]">*</span></label>
                    <input type="text" name="name" required 
                        class="block w-full px-4 py-2.5 bg-[#F7F9FC] border border-[#E5E8EF] rounded-[12px] text-sm text-[#1D2129] placeholder-[#86909C] focus:outline-none focus:bg-white focus:border-[#165DFF] focus:ring-2 focus:ring-[#165DFF]/20 transition-all"
                        placeholder="设置您的登录账号">
                </div>

                <!-- 手机号 -->
                <div>
                    <label class="block text-sm font-medium text-[#4E5969] mb-1.5">手机号码</label>
                    <input type="tel" name="mobile" 
                        class="block w-full px-4 py-2.5 bg-[#F7F9FC] border border-[#E5E8EF] rounded-[12px] text-sm text-[#1D2129] placeholder-[#86909C] focus:outline-none focus:bg-white focus:border-[#165DFF] focus:ring-2 focus:ring-[#165DFF]/20 transition-all"
                        placeholder="用于找回密码（选填）">
                </div>

                <!-- 密码 -->
                <div>
                    <label class="block text-sm font-medium text-[#4E5969] mb-1.5">密码 <span class="text-[#F53F3F]">*</span></label>
                    <input type="password" name="password" required 
                        class="block w-full px-4 py-2.5 bg-[#F7F9FC] border border-[#E5E8EF] rounded-[12px] text-sm text-[#1D2129] placeholder-[#86909C] focus:outline-none focus:bg-white focus:border-[#165DFF] focus:ring-2 focus:ring-[#165DFF]/20 transition-all"
                        placeholder="6位以上字符">
                </div>

                <!-- 确认密码 -->
                <div>
                    <label class="block text-sm font-medium text-[#4E5969] mb-1.5">确认密码 <span class="text-[#F53F3F]">*</span></label>
                    <input type="password" name="password2" required 
                        class="block w-full px-4 py-2.5 bg-[#F7F9FC] border border-[#E5E8EF] rounded-[12px] text-sm text-[#1D2129] placeholder-[#86909C] focus:outline-none focus:bg-white focus:border-[#165DFF] focus:ring-2 focus:ring-[#165DFF]/20 transition-all"
                        placeholder="再次输入密码">
                </div>

                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-[12px] text-sm font-bold text-white bg-[#165DFF] hover:bg-[#165DFF]/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#165DFF] transition-all shadow-md shadow-blue-500/20 mt-6">
                    注 册
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="px-8 pb-6 text-center">
            <p class="text-sm text-[#4E5969]">
                已有账号？
                <a href="{{ url_for('account.login') }}" class="text-[#165DFF] font-medium hover:underline">直接登录</a>
            </p>
        </div>
    </div>

</body>
</html>

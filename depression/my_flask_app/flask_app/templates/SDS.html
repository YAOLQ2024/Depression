<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测评进行中 - SDS 抑郁自评与辅助分析系统</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#3B82F6', hover: '#2563EB', light: '#EFF6FF' },
                        slate: { 50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1', 400: '#94A3B8', 500: '#64748B', 600: '#475569', 700: '#334155', 800: '#1E293B', 900: '#0F172A' },
                    },
                    fontFamily: {
                        sans: ['"Inter"', '"Noto Sans SC"', 'sans-serif'], 
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.05)',
                        'card': '0 10px 40px -10px rgba(0, 0, 0, 0.05)',
                        'card-hover': '0 20px 40px -5px rgba(59, 130, 246, 0.08), 0 0 0 1px rgba(59, 130, 246, 0.1)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.15)',
                        'option-active': '0 4px 12px rgba(59, 130, 246, 0.15), 0 0 0 2px #3B82F6',
                        'inner-text': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
                    },
                    animation: {
                        'float': 'float 8s ease-in-out infinite',
                        'float-slow': 'float 12s ease-in-out infinite',
                        'float-slower': 'float 18s ease-in-out infinite',
                        'float-reverse': 'float-reverse 10s ease-in-out infinite',
                        'float-reverse-slow': 'float-reverse 15s ease-in-out infinite',
                        'float-reverse-slower': 'float-reverse 20s ease-in-out infinite',
                        'float-huge': 'float-huge 20s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'meander': 'meander 5s ease-in-out infinite',
                        'meander-fast': 'meander 3.3s ease-in-out infinite',
                        'meander-reverse': 'meander-reverse 6s ease-in-out infinite',
                        'meander-slow': 'meander 7s ease-in-out infinite',
                        'wave': 'wave 1.5s ease-in-out infinite',
                        'scan': 'scan 3s linear infinite',
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'cursor': 'cursor 1s step-end infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '50%': { transform: 'translate(0, -20px)' },
                        },
                        'float-reverse': {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '50%': { transform: 'translate(0, 20px)' },
                        },
                        meander: {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '25%': { transform: 'translate(150px, -150px)' },
                            '50%': { transform: 'translate(-90px, 210px)' },
                            '75%': { transform: 'translate(-210px, -90px)' },
                        },
                        'meander-reverse': {
                            '0%, 100%': { transform: 'translate(0, 0)' },
                            '25%': { transform: 'translate(-150px, 150px)' },
                            '50%': { transform: 'translate(90px, -210px)' },
                            '75%': { transform: 'translate(210px, 90px)' },
                        },
                        wave: {
                            '0%, 100%': { height: '8px' },
                            '50%': { height: '24px' },
                        },
                        scan: {
                            '0%': { top: '0%', opacity: 0 },
                            '10%': { opacity: 1 },
                            '90%': { opacity: 1 },
                            '100%': { top: '100%', opacity: 0 },
                        },
                        cursor: {
                            '0%, 100%': { opacity: 1 },
                            '50%': { opacity: 0 },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        body {
            background-color: #F8FAFC;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(219, 234, 254, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(254, 243, 199, 0.3) 0%, transparent 50%);
            min-height: 100vh;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(248, 250, 252, 0.85) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px -2px rgba(148, 163, 184, 0.1);
            position: relative;
            overflow: hidden;
        }

        .ambient-sphere { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
        
        .pattern-dots {
            background-image: radial-gradient(#94A3B8 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.15;
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
        }

        .dynamic-bubble {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
        }

        /* 录音波浪 */
        .voice-bar {
            width: 4px;
            background-color: #3B82F6;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        .voice-bar:nth-child(odd) { animation-duration: 0.8s; background-color: #60A5FA; }
        .voice-bar:nth-child(2n) { animation-duration: 1.1s; }
        .voice-bar:nth-child(3n) { animation-duration: 1.3s; background-color: #93C5FD; }

        /* 摄像头扫描线 */
        .scan-line {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, rgba(59, 130, 246, 0.8), transparent);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
            animation: scan 3s linear infinite;
        }

        /* 水印 */
        .watermark {
            position: absolute; opacity: 0.03; pointer-events: none;
        }

        /* 卡片内部悬浮球样式 */
        .inner-bubble {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(3px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-700 font-sans antialiased relative h-screen flex flex-col overflow-hidden">

    <script>
        // 1. EEG Canvas Animation (3 Channels)
        const canvases = [
            document.getElementById('eegCanvas1'),
            document.getElementById('eegCanvas2'),
            document.getElementById('eegCanvas3')
        ];
        const ctxs = canvases.map(c => c.getContext('2d'));
        
        function resizeCanvases() {
            canvases.forEach(canvas => {
                if(canvas && canvas.parentElement) {
                    canvas.width = canvas.parentElement.offsetWidth;
                    canvas.height = canvas.parentElement.offsetHeight;
                }
            });
        }
        window.addEventListener('resize', resizeCanvases);
        setTimeout(resizeCanvases, 100);

        let offset = 0;
        
        function drawEEG() {
            offset += 2;
            
            ctxs.forEach((ctx, index) => {
                if(!ctx) return;
                const canvas = canvases[index];
                const width = canvas.width;
                const height = canvas.height;
                
                ctx.clearRect(0, 0, width, height);
                ctx.beginPath();
                
                // Different colors for different channels
                const colors = ['#6366F1', '#3B82F6', '#8B5CF6']; // Indigo, Blue, Purple
                ctx.strokeStyle = colors[index];
                ctx.lineWidth = 2;
                
                for (let x = 0; x < width; x++) {
                    // Unique wave pattern for each channel
                    const frequency = 0.05 + (index * 0.01);
                    const amplitude = 10 - (index * 2);
                    const phase = offset * (1 + index * 0.2);
                    
                    const y = height / 2 + 
                              Math.sin((x + phase) * frequency) * amplitude + 
                              Math.sin((x + phase * 0.5) * 0.02) * 4;
                              
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                ctx.stroke();
                
                // Gradient fill
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                const gradient = ctx.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, colors[index] + '33'); // 20% opacity
                gradient.addColorStop(1, colors[index] + '00'); // 0% opacity
                ctx.fillStyle = gradient;
                ctx.fill();
            });

            requestAnimationFrame(drawEEG);
        }
        drawEEG();

        // 2. Dynamic Bubbles (Background)
        function createBubbles() {
            const container = document.getElementById('bubble-container');
            const bubbleCount = 40;
            const gradients = [
                'bg-gradient-to-tr from-pink-300 to-blue-300',
                'bg-teal-200', 'bg-blue-300', 'bg-indigo-300', 'bg-orange-200', 'bg-white'
            ];
            const blurs = ['blur-sm', 'blur-md', 'blur-lg'];
            const animations = ['animate-float', 'animate-float-slow', 'animate-float-reverse'];

            for (let i = 0; i < bubbleCount; i++) {
                const bubble = document.createElement('div');
                const size = Math.floor(Math.random() * 80) + 10;
                const left = Math.floor(Math.random() * 100);
                const top = Math.floor(Math.random() * 100);
                const gradient = gradients[Math.floor(Math.random() * gradients.length)];
                const blur = blurs[Math.floor(Math.random() * blurs.length)];
                const animation = animations[Math.floor(Math.random() * animations.length)];
                const opacity = (Math.random() * 0.3 + 0.05).toFixed(2);
                const delay = (Math.random() * -20).toFixed(1) + 's';

                bubble.className = `dynamic-bubble absolute rounded-full ${gradient} ${blur} ${animation}`;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${left}%`;
                bubble.style.top = `${top}%`;
                bubble.style.opacity = opacity;
                bubble.style.animationDelay = delay;
                container.appendChild(bubble);
            }
        }
        document.addEventListener('DOMContentLoaded', createBubbles);
    </script>

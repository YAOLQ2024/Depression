components:
  responses:
    StandardSuccess:
      description: 标准成功返回 / Standard success response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardResponse'
          example:
            code: 0
            message: ok
            data:
              result:
                status: success
            request_id: req-20260401-001
            timestamp: '2026-04-01T15:30:00+08:00'

    HealthSuccess:
      description: 健康检查成功返回 / Health success response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HealthResponse'
          example:
            code: 0
            message: ok
            data:
              status: up
              mode: mock
              model_loaded: false
              version: v1
            request_id: req-20260401-002
            timestamp: '2026-04-01T15:31:00+08:00'

    MetaSuccess:
      description: 元信息成功返回 / Meta success response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MetaResponse'
          example:
            code: 0
            message: ok
            data:
              module: speech
              capability: speech-transcribe
              module_zh: 语音处理模块
              capability_zh: 语音转写能力
              version: v1
              owner: team-a
              input_schema_version: 1.0.0
              output_schema_version: 1.0.0
              supports_mock: true
            request_id: req-20260401-003
            timestamp: '2026-04-01T15:32:00+08:00'

    Error400:
      description: 请求参数错误 / Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 4001
            message: missing required field
            data: null
            request_id: req-20260401-004
            timestamp: '2026-04-01T15:33:00+08:00'

    Error401:
      description: 鉴权失败 / Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 4003
            message: auth failed
            data: null
            request_id: req-20260401-005
            timestamp: '2026-04-01T15:34:00+08:00'

    Error409:
      description: 状态冲突 / Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 4009
            message: operation not allowed in current state
            data: null
            request_id: req-20260401-006
            timestamp: '2026-04-01T15:35:00+08:00'

    Error500:
      description: 服务内部异常 / Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 5001
            message: internal service error
            data: null
            request_id: req-20260401-007
            timestamp: '2026-04-01T15:36:00+08:00'

    Error503:
      description: 服务未就绪或模型未加载 / Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: 7001
            message: model not loaded
            data: null
            request_id: req-20260401-008
            timestamp: '2026-04-01T15:37:00+08:00'

  schemas:
    StandardResponse:
      type: object
      required:
        - code
        - message
        - data
        - request_id
        - timestamp
      properties:
        code:
          type: integer
          description: 业务状态码 / Business code
          example: 0
        message:
          type: string
          description: 人类可读信息 / Human-readable message
          example: ok
        data:
          type: object
          description: 业务结果主体 / Business data
          additionalProperties: true
        request_id:
          type: string
          description: 请求唯一标识 / Request identifier
          example: req-20260401-001
        timestamp:
          type: string
          format: date-time
          description: 响应时间，统一使用 ISO 8601（国际时间格式）
          example: '2026-04-01T15:30:00+08:00'

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - data
        - request_id
        - timestamp
      properties:
        code:
          type: integer
          description: 非 0 业务错误码 / Non-zero business error code
          example: 4001
        message:
          type: string
          description: 错误描述 / Error message
          example: missing required field
        data:
          type: object
          nullable: true
          description: 失败时通常为 null
          additionalProperties: true
          example: null
        request_id:
          type: string
          description: 请求唯一标识 / Request identifier
          example: req-20260401-004
        timestamp:
          type: string
          format: date-time
          description: 响应时间 / Response timestamp
          example: '2026-04-01T15:33:00+08:00'

    HealthResponse:
      type: object
      required:
        - code
        - message
        - data
        - request_id
        - timestamp
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/HealthData'
        request_id:
          type: string
          example: req-20260401-002
        timestamp:
          type: string
          format: date-time
          example: '2026-04-01T15:31:00+08:00'

    HealthData:
      type: object
      required:
        - status
        - mode
        - model_loaded
        - version
      properties:
        status:
          type: string
          description: 服务状态 / Service status
          example: up
        mode:
          type: string
          description: 当前模式 / Current mode
          enum:
            - mock
            - prod
          example: mock
        model_loaded:
          type: boolean
          description: 模型是否已加载 / Whether model is loaded
          example: false
        version:
          type: string
          description: 模块版本 / Module version
          example: v1

    MetaResponse:
      type: object
      required:
        - code
        - message
        - data
        - request_id
        - timestamp
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/MetaData'
        request_id:
          type: string
          example: req-20260401-003
        timestamp:
          type: string
          format: date-time
          example: '2026-04-01T15:32:00+08:00'

    MetaData:
      type: object
      required:
        - module
        - capability
        - module_zh
        - capability_zh
        - version
        - input_schema_version
        - output_schema_version
        - supports_mock
      properties:
        module:
          type: string
          description: 一级模块英文名 / Top-level module name
          example: speech
        capability:
          type: string
          description: 二级能力英文名 / Capability name
          example: speech-transcribe
        module_zh:
          type: string
          description: 一级模块中文名
          example: 语音处理模块
        capability_zh:
          type: string
          description: 二级能力中文名
          example: 语音转写能力
        version:
          type: string
          description: 接口版本 / API version
          example: v1
        owner:
          type: string
          description: 负责人或小组 / Owner or team
          example: team-a
        input_schema_version:
          type: string
          description: 输入结构版本 / Input schema version
          example: 1.0.0
        output_schema_version:
          type: string
          description: 输出结构版本 / Output schema version
          example: 1.0.0
        supports_mock:
          type: boolean
          description: 是否支持 Mock（模拟）模式
          example: true

    MessageItem:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
          description: 对话角色 / Conversation role
        content:
          type: string
          description: 消息内容 / Message content

    AnswerItem:
      type: object
      required:
        - question_id
        - answer_value
      properties:
        question_id:
          type: string
          description: 题目编号 / Question identifier
          example: phq9_q1
        answer_value:
          type: integer
          description: 答案值 / Answer value
          example: 2
        answer_text:
          type: string
          description: 答案文本 / Answer text
          example: 一半以上天数

    ScaleDraftPayload:
      type: object
      properties:
        draft_id:
          type: integer
          description: 草稿记录 ID / Draft identifier
          example: 12
        scale_slug:
          type: string
          description: 量表英文标识 / Scale slug
          example: phq9
        flow_session_id:
          type: string
          nullable: true
          description: 量表流程会话标识 / Screening flow session identifier
          example: flow-123456
        answers:
          type: object
          description: 当前已保存的答案 / Persisted answers
          additionalProperties:
            type: integer
          example:
            q1: 1
            q2: 2
        answered_count:
          type: integer
          description: 已完成题数 / Answered item count
          example: 2
        current_item_index:
          type: integer
          description: 最近作答位置，从 0 开始 / Last answered item index
          example: 1
        started_at:
          type: integer
          nullable: true
          description: 开始作答时间戳 / Start timestamp
          example: 1712050000
        saved_use_time:
          type: integer
          description: 当前累计用时，单位秒 / Saved elapsed time in seconds
          example: 42
        status:
          type: string
          description: 草稿状态 / Draft status
          example: draft
        updated_at:
          type: string
          format: date-time
          description: 最近更新时间 / Last updated time
          example: '2026-04-02T19:15:00+08:00'

    ScaleDraftResponseData:
      type: object
      properties:
        draft:
          allOf:
            - $ref: '#/components/schemas/ScaleDraftPayload'
          nullable: true
        flow_session:
          type: object
          nullable: true
          description: 流程会话摘要 / Flow session summary
          additionalProperties: true

    ScaleDraftResponse:
      type: object
      required:
        - code
        - message
        - data
        - request_id
        - timestamp
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          $ref: '#/components/schemas/ScaleDraftResponseData'
        request_id:
          type: string
          example: req-20260402-draft-001
        timestamp:

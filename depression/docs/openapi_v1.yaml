openapi: 3.0.3
info:
  title: 抑郁症辅助干预系统 OpenAPI 接口草稿（V1）
  version: 1.0.0-draft
  description: |
    本文档是抑郁症辅助干预系统 V1 阶段的 OpenAPI（接口描述标准）草稿。

    当前草稿基于以下三个设计文档整理而来：
    1. system_modular_api_design_v1_20260401.md
    2. system_module_master_table_v1_20260401.md
    3. system_api_response_standard_v1_20260401.md

    当前目标：
    1. 固定 11 个一级模块和 12 个二级能力模块的主接口
    2. 固定统一返回结构 code / message / data / request_id / timestamp
    3. 为后续 Flask（Web 框架）或 APIFlask（基于 Flask 的 API 框架）实现提供代码依据
    4. 为组员联调、Mock（模拟接口）和后续服务化改造提供统一契约

    当前范围：
    1. 每个二级能力模块先提供 1 个主业务接口
    2. 每个二级能力模块必须提供 1 个 health（健康检查）接口
    3. 每个二级能力模块必须提供 1 个 meta（元信息）接口

servers:
  - url: http://127.0.0.1:5000
    description: 本地 Flask（Web 框架）开发环境
  - url: http://127.0.0.1:8000
    description: 预留服务化或独立 API（接口）环境

tags:
  - name: api-v1
    description: 统一 API 入口
  - name: auth-profile
    description: 身份认证与用户建档模块
  - name: persona
    description: 虚拟医生与交互角色模块
  - name: assessment
    description: 量表评估模块
  - name: text-dialogue
    description: 文本对话与引导问诊模块
  - name: speech
    description: 语音处理模块
  - name: emotion
    description: 表情识别模块
  - name: eeg
    description: 脑电信号模块
  - name: risk-assessment
    description: 风险评估与安全建议模块
  - name: intervention
    description: 个性化调控与执行模块
  - name: history-report
    description: 历史记录与报告模块
  - name: admin-settings
    description: 后台管理与系统设置模块

paths:
  /api/v1/health:
    get:
      tags:
        - api-v1
      summary: 统一 API 入口健康检查接口
      operationId: apiV1Health
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/meta:
    get:
      tags:
        - api-v1
      summary: 统一 API 入口元信息接口
      operationId: apiV1Meta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/auth-profile/identity-access/login:
    post:
      tags:
        - auth-profile
      summary: 身份认证与档案能力登录接口
      operationId: authProfileIdentityAccessLogin
      description: |
        `identity-access（身份认证与档案能力）` 的主接口。
        用于完成登录、身份校验和会话初始化。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /api/v1/auth-profile/identity-access/health:
    get:
      tags:
        - auth-profile
      summary: 身份认证与档案能力健康检查接口
      operationId: authProfileIdentityAccessHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/auth-profile/identity-access/meta:
    get:
      tags:
        - auth-profile
      summary: 身份认证与档案能力元信息接口
      operationId: authProfileIdentityAccessMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/persona/virtual-clinician/select:
    post:
      tags:
        - persona
      summary: 虚拟医生选择能力主接口
      operationId: personaVirtualClinicianSelect
      description: |
        `virtual-clinician（虚拟医生选择能力）` 的主接口。
        用于用户选择虚拟医生形象、交互风格和语音播报偏好。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaSelectRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /api/v1/persona/virtual-clinician/health:
    get:
      tags:
        - persona
      summary: 虚拟医生选择能力健康检查接口
      operationId: personaVirtualClinicianHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/persona/virtual-clinician/meta:
    get:
      tags:
        - persona
      summary: 虚拟医生选择能力元信息接口
      operationId: personaVirtualClinicianMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/assessment/scale-screening/submit:
    post:
      tags:
        - assessment
      summary: 结构化量表筛查能力提交接口
      operationId: assessmentScaleScreeningSubmit
      description: |
        `scale-screening（结构化量表筛查能力）` 的主接口。
        用于提交量表答案、触发计分并返回结构化评估结果。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessmentSubmitRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /api/v1/assessment/scale-screening/list:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力列表接口
      operationId: assessmentScaleScreeningList
      description: |
        返回当前已接入的量表定义列表。
      parameters:
        - name: scale_slug
          in: query
          required: false
          schema:
            type: string
          description: 量表英文标识，可选；传入后仅返回对应量表
        - name: include_items
          in: query
          required: false
          schema:
            type: boolean
          description: 是否返回完整题目定义，默认 true
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '401':
          $ref: '#/components/responses/Error401'

  /api/v1/assessment/scale-screening/result/{record_id}:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力结果查询接口
      operationId: assessmentScaleScreeningResult
      parameters:
        - name: record_id
          in: path
          required: true
          schema:
            type: integer
          description: 量表记录 ID / Assessment record identifier
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'

  /api/v1/assessment/scale-screening/latest:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力最新结果接口
      operationId: assessmentScaleScreeningLatest
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '401':
          $ref: '#/components/responses/Error401'

  /api/v1/assessment/scale-screening/draft/{scale_slug}:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力草稿读取接口
      operationId: assessmentScaleScreeningDraftGet
      description: |
        返回当前用户在指定量表下的最新未完成草稿。
        如果存在 `flow_session_id（流程会话标识）`，则优先返回该流程内的草稿。
      parameters:
        - name: scale_slug
          in: path
          required: true
          schema:
            type: string
            enum:
              - phq9
              - gad7
          description: 量表英文标识 / Scale slug
        - name: flow_session_id
          in: query
          required: false
          schema:
            type: string
          description: 量表流程会话标识 / Screening flow session identifier
      responses:
        '200':
          description: 草稿读取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScaleDraftResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error400'

  /api/v1/assessment/scale-screening/draft/save:
    post:
      tags:
        - assessment
      summary: 结构化量表筛查能力草稿保存接口
      operationId: assessmentScaleScreeningDraftSave
      description: |
        用于保存 `PHQ-9（患者健康问卷）` 或 `GAD-7（广泛性焦虑量表）` 的未完成进度。
        草稿仅用于恢复填写，不参与 `risk-assessment（风险评估与安全建议模块）`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScaleDraftSaveRequest'
      responses:
        '200':
          description: 草稿保存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScaleDraftResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error400'

  /api/v1/assessment/scale-screening/flow-session/{flow_session_id}/risk-payload-preview:
    get:
      tags:
        - assessment
      summary: 量表流程风险评估输入预览接口
      operationId: assessmentScaleScreeningFlowRiskPayloadPreviewGet
      description: |
        预览当前 `flow-session（量表流程会话）` 最终会送入
        `risk-assessment（风险评估与安全建议模块）` 的完整输入体。
        该接口只返回拼装结果，不会真正执行风险评估。
      parameters:
        - name: flow_session_id
          in: path
          required: true
          schema:
            type: string
          description: 量表流程会话标识 / Screening flow session identifier
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error400'
    post:
      tags:
        - assessment
      summary: 带模态覆盖的量表流程风险评估输入预览接口
      operationId: assessmentScaleScreeningFlowRiskPayloadPreviewPost
      description: |
        可额外传入 `text_summary / speech_summary / emotion_summary / eeg_summary`
        以预览这些模态接入后将如何进入 `risk-assessment（风险评估与安全建议模块）`。
        该接口只返回拼装结果，不会真正执行风险评估。
      parameters:
        - name: flow_session_id
          in: path
          required: true
          schema:
            type: string
          description: 量表流程会话标识 / Screening flow session identifier
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                trigger_reason:
                  type: string
                text_summary:
                  type: object
                speech_summary:
                  type: object
                emotion_summary:
                  type: object
                eeg_summary:
                  type: object
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '404':
          $ref: '#/components/responses/Error400'

  /api/v1/assessment/scale-screening/health:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力健康检查接口
      operationId: assessmentScaleScreeningHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/assessment/scale-screening/meta:
    get:
      tags:
        - assessment
      summary: 结构化量表筛查能力元信息接口
      operationId: assessmentScaleScreeningMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/text-dialogue/guided-conversation/run:
    post:
      tags:
        - text-dialogue
      summary: 引导式文本问诊能力主接口
      operationId: textDialogueGuidedConversationRun
      description: |
        `guided-conversation（引导式文本问诊能力）` 的主接口。
        用于在初步风险分层之后发起有目的的引导问诊，
        补全用户画像、提取关键信息并生成结构化摘要，
        为后续 `intervention-decision（个性化调控决策能力）` 提供输入。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuidedConversationRunRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/text-dialogue/guided-conversation/health:
    get:
      tags:
        - text-dialogue
      summary: 引导式文本问诊能力健康检查接口
      operationId: textDialogueGuidedConversationHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/text-dialogue/guided-conversation/meta:
    get:
      tags:
        - text-dialogue
      summary: 引导式文本问诊能力元信息接口
      operationId: textDialogueGuidedConversationMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/speech/speech-transcribe/run:
    post:
      tags:
        - speech
      summary: 语音转写能力主接口
      operationId: speechSpeechTranscribeRun
      description: |
        `speech-transcribe（语音转写能力）` 的主接口。
        用于将普通话、方言或混合口音音频转成标准文本。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechTranscribeRunRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/speech/speech-transcribe/health:
    get:
      tags:
        - speech
      summary: 语音转写能力健康检查接口
      operationId: speechSpeechTranscribeHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/speech/speech-transcribe/meta:
    get:
      tags:
        - speech
      summary: 语音转写能力元信息接口
      operationId: speechSpeechTranscribeMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/speech/speech-emotion/analyze:
    post:
      tags:
        - speech
      summary: 语音情绪识别能力主接口
      operationId: speechSpeechEmotionAnalyze
      description: |
        `speech-emotion（语音情绪识别能力）` 的主接口。
        用于从原始音频中分析情绪倾向、语气和基础声学特征。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechEmotionAnalyzeRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/speech/speech-emotion/health:
    get:
      tags:
        - speech
      summary: 语音情绪识别能力健康检查接口
      operationId: speechSpeechEmotionHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/speech/speech-emotion/meta:
    get:
      tags:
        - speech
      summary: 语音情绪识别能力元信息接口
      operationId: speechSpeechEmotionMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/emotion/facial-affect/analyze:
    post:
      tags:
        - emotion
      summary: 面部表情情绪识别能力主接口
      operationId: emotionFacialAffectAnalyze
      description: |
        `facial-affect（面部表情情绪识别能力）` 的主接口。
        用于对图像帧或会话片段中的面部表情进行情绪分析。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacialAffectAnalyzeRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/emotion/facial-affect/health:
    get:
      tags:
        - emotion
      summary: 面部表情情绪识别能力健康检查接口
      operationId: emotionFacialAffectHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/emotion/facial-affect/meta:
    get:
      tags:
        - emotion
      summary: 面部表情情绪识别能力元信息接口
      operationId: emotionFacialAffectMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/eeg/eeg-sensing/analyze:
    post:
      tags:
        - eeg
      summary: 脑电采集与分析能力主接口
      operationId: eegEegSensingAnalyze
      description: |
        `eeg-sensing（脑电采集与分析能力）` 的主接口。
        用于接收脑电快照、文件引用或预处理摘要，并返回特征与分类结果。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EegSensingAnalyzeRequest'
      responses:
        '200':
          $ref: '#/components/responses/StandardSuccess'
        '400':
          $ref: '#/components/responses/Error400'
        '500':
          $ref: '#/components/responses/Error500'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/eeg/eeg-sensing/health:
    get:
      tags:
        - eeg
      summary: 脑电采集与分析能力健康检查接口
      operationId: eegEegSensingHealth
      responses:
        '200':
          $ref: '#/components/responses/HealthSuccess'
        '503':
          $ref: '#/components/responses/Error503'

  /api/v1/eeg/eeg-sensing/meta:
    get:
      tags:
        - eeg
      summary: 脑电采集与分析能力元信息接口
      operationId: eegEegSensingMeta
      responses:
        '200':
          $ref: '#/components/responses/MetaSuccess'

  /api/v1/risk-assessment/risk-stratification/score:
    post:
      tags:
        - risk-assessment
      summary: 初步风险分层与安全建议能力主接口
      operationId: riskAssessmentRiskStratificationScore
      description: |
        `risk-stratification（初步风险分层与安全建议能力）` 的主接口。
        用于聚合建档信息、量表结果和作答过程的多模态摘要结果，
        输出初步风险等级、阈值命中情况、就医建议和是否允许继续体验系统调控。
        该接口不直接负责最终的个性化调控内容选择。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskStratificationScoreRequest'
            examples:
              standard_case:
                summary: 常规评估请求示例
                value:
                  user_id: user-1001
                  session_id: sess-risk-001
                  user_profile:
                    age_group: 18-25
                    gender: female
                    education_stage: undergraduate
                    living_status: dormitory
                  persona_preference:
                    persona_id: warm-doctor-01
                    style: warm
                    voice_preference: female-soft
                  assessment_summary:
                    available: true
                    scale_type: PHQ-9
                    total_score: 16
                    severity: moderately_severe
                    confidence: 0.95
                    summary: PHQ-9 得分较高，近两周抑郁症状较明显
                    self_harm_item_positive: false
                    structured_flags:
                      - sleep_problem
                      - low_mood
                  text_summary:
                    available: true
                    score: 0.44
                    level: medium
                    confidence: 0.73
                    summary: 用户补充提到近期学习压力大、睡眠差
                    keywords:
                      - 压力大
                      - 睡眠差
                  speech_summary:
                    available: true
                    score: 0.62
                    level: medium
                    confidence: 0.78
                    label: sad
                    summary: 语音整体低沉，语速偏慢
                  emotion_summary:
                    available: true
                    score: 0.58
                    level: medium
                    confidence: 0.72
                    label: sad
                    summary: 表情整体偏消极
                  eeg_summary:
                    available: false
                    score: null
                    level: null
                    confidence: null
                    summary: null
                  decision_context:
                    source_page: assessment_result
                    threshold_version: v1
                    collected_modalities:
                      - assessment
                      - text
                      - speech
                      - emotion
